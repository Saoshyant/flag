<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>Canvas: Formas Rectangulares</title>
		<script>
			document.addEventListener("DOMContentLoaded", () => {

				const canvas = document.querySelector("canvas").getContext("2d");

				canvas.fillStyle = "#00F";

				canvas.fillRect(200, 200, 150, 150);

				canvas.fillStyle = "#F00";
				
				canvas.fillRect(360, 200, 150, 150);

				canvas.strokeStyle = "#F0F";

				canvas.strokeRect(200, 360, 150, 150);

				canvas.strokeStyle = "#060";
				canvas.strokeRect(360, 360, 150, 150);
			});
		</script>
		<style>
			canvas { outline: 1px solid red; }
		</style>
	</head>
	<body>
		<canvas width="800" height="800"></canvas>
	</body>
</html>
