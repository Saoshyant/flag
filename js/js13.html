<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>Jogo do Galo</title>
		<style>
			main {
				max-width: 980px;
				margin: 0 auto;
			}

			#scoreBoard {
				display: flex;
				justify-content: space-between;
			}

			main div {
				display: flex;
			}

			main div button {
				width: 30vw;
				min-height: 20vh;
				border: 1px solid #CCC;
				font-size: 6vw;
				cursor: pointer;
			}
		</style>
		<script>
			document.addEventListener("DOMContentLoaded", function() {
				const buttons = document.getElementsByTagName("button");
				
				let currentSymbol = "X";

				const score = {
					X: 0,
					O: 0
				}

				function updateScore() {
					alert("Terminou.  Ganhou " + currentSymbol);

					// aumentar pontuação de quem ganhou
					score[currentSymbol]++;
					
					// mostrar na página
					document.getElementById(currentSymbol).textContent = score[currentSymbol];
					/*
					if(currentSymbol === "X") {
						document.getElementById("X").textContent = score.X;
					}
					else {
						document.getElementById("O").textContent = score.O;
					}
					*/

					// fazer a limpeza da area de jogo
					for(let i = 0; i < buttons.length; i++) {
						buttons[i].textContent = "";
					}
					currentSymbol = "";
				}

				function checkGameOver() {

					if(
						buttons[0].textContent !== "" &&
						buttons[0].textContent === buttons[1].textContent &&
						buttons[0].textContent === buttons[2].textContent
					) {
						updateScore();
					}

					if(
						buttons[3].textContent !== "" &&
						buttons[3].textContent === buttons[4].textContent &&
						buttons[3].textContent === buttons[5].textContent
					) {
						updateScore();
					}

					if(
						buttons[6].textContent !== "" &&
						buttons[6].textContent === buttons[7].textContent &&
						buttons[6].textContent === buttons[8].textContent
					) {
						updateScore();
					}

					if(
						buttons[0].textContent !== "" &&
						buttons[0].textContent === buttons[3].textContent &&
						buttons[0].textContent === buttons[6].textContent
					) {
						updateScore();
					}

					if(
						buttons[1].textContent !== "" &&
						buttons[1].textContent === buttons[4].textContent &&
						buttons[1].textContent === buttons[7].textContent
					) {
						updateScore();
					}

					if(
						buttons[2].textContent !== "" &&
						buttons[2].textContent === buttons[5].textContent &&
						buttons[2].textContent === buttons[8].textContent
					) {
						updateScore();
					}

					if(
						buttons[0].textContent !== "" &&
						buttons[0].textContent === buttons[4].textContent &&
						buttons[0].textContent === buttons[8].textContent
					) {
						updateScore();
					}

					if(
						buttons[2].textContent !== "" &&
						buttons[2].textContent === buttons[4].textContent &&
						buttons[2].textContent === buttons[6].textContent
					) {
						updateScore();
					}
				}

				for(let i = 0; i < buttons.length; i++) {

					buttons[i].addEventListener("click", function() {

						if(buttons[i].textContent === "") {
							buttons[i].textContent = currentSymbol;

							checkGameOver();

							if(currentSymbol === "X") {
								currentSymbol = "O";
							}
							else {
								currentSymbol = "X";
							}
						}

						//buttons[i].disabled = true;
					});
				}
			});
		</script>
	</head>
	<body>
		<main>
			<dl id="scoreBoard">
				<dt>X venceu</dt>
				<dd id="X">0</dd>
				<dt>O venceu</dt>
				<dd id="O">0</dd>
			</dl>
			<div>
				<button type="button"></button>
				<button type="button"></button>
				<button type="button"></button>
			</div>
			<div>
				<button type="button"></button>
				<button type="button"></button>
				<button type="button"></button>
			</div>
			<div>
				<button type="button"></button>
				<button type="button"></button>
				<button type="button"></button>
			</div>
		</main>
	</body>
</html>
