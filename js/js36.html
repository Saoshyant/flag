<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>Controlo de Teclas do Teclado</title>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
			
				const canvas = document.querySelector("canvas");
				const canvasCtx = canvas.getContext("2d");

				const circle = {
					x: 60,
					y: 60,
					r: 20
				}

				setInterval(() => {
				
					canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
				
					canvasCtx.beginPath();
					canvasCtx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);

					canvasCtx.fill();
				
				}, 50);

				document.addEventListener("keydown", event => {

					/* exercício: quando utilizador pressionar as outras setas (esquerda, cima, baixo)
					
					   passo 1: detectar keycode correspondente a tecla pressionada
					   passo 2: diminuir ou aumentar no circle a coordenada correspondente para andar nessa direcção
					*/
					
					if( event.keyCode === 39 ) {
						circle.x += circle.r;
					}
					
					if( event.keyCode === 37 ) {
						circle.x -= circle.r;
					}

					if( event.keyCode === 38 ) {
						circle.y -= circle.r;
					}

					if( event.keyCode === 40 ) {
						circle.y += circle.r;
					}
				
				});

			});
		</script>
	</head>
	<body>
		<canvas width="900" height="900"></canvas>
	</body>
</html>
