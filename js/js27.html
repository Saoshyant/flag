<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>Arrow Functions</title>
		<script>
			document.addEventListener("DOMContentLoaded", () => {

				const div = document.querySelector("div");

				div.addEventListener("click", () => {
					div.textContent = "Lorem ipsum alterado após click";
				});
			});
		</script>
	</head>
	<body>
		<div>Lorem Ipsum e cenas e tal</div>
	</body>
</html>
