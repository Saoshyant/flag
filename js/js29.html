<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>AJAX: Invocação básica de uma API</title>
		<script>
			document.addEventListener("DOMContentLoaded", () => {

				const list = document.getElementById("list");

				fetch("https://jsonplaceholder.typicode.com/users")
				.then( response => response.json() )
				.then( result => {
				
					/* exercício:
					   escrever o nome de cada utilizador 
					   num <li> dentro da nossa página
					   para obter cada utilizador, estando nós a lidar com um Array, é preciso usar um ciclo
					*/
					for(let i = 0; i < result.length; i++) {

						list.appendChild( document.createElement("li") );

						list.lastElementChild.textContent = result[i].name;
					}
				});
			});
		</script>
	</head>
	<body>
		<h1>Lista de Utilizadores</h1>
		<ul id="list"></ul>
	</body>
</html>
