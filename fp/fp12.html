<!--
exercício final

criar um função que consegue dizer qual o numero menor entre dois numeros recebidos como argumentos

exemplo: min(5, 89)  resultado: 5
exemplo: min(99, 10) resultado: 10
exemplo: min(6, 6)   resultado: são iguais
-->
<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="utf-8">
        <title>Exercício Final: função "min"</title>
        <script>
            function min(x, y) {

                if(x < y) {
                    console.log(x);
                }
                else if(x > y) {
                    console.log(y);
                }
                else {
                    console.log("são iguais");                
                }
            }

            min(5, 89); // 5
            min(99, 10); // 10
            min(6, 6); // são iguais
        </script>
    </head>

    </body>
</html>
