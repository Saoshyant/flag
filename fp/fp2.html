<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="UTF-8" />
		<title>Fundamentos de Programação: Operações Aritméticas / Matemática</title>
		<script>
			console.log('20 + 2 =', 20 + 2);
			console.log('20 + 0.2 =', 20 + 0.2);

			console.log('10 - 2 =', 10 - 2);

			console.log('20 x 2 =', 20 * 2);

			console.log("20 / 2 =", 20 / 2);

            /* exercício, efectuar o seguinte calculo: 2 + 4 * 6 / 2 = 18 */

            console.log( (2 + 4) * 6 / 2);

            /* quinto operador aritmético: modus
               encontra o resto de uma divisão
               útil, por exemplo, para saber se algo é par ou impar divindo por 2
               útil para saber se algo é divisivel por um número especifico quando precisamos
                  de encaixar X numero de coisas por linha
            */
           console.log( 4 % 2 );
           console.log( 3 % 1 );
           console.log( 5 % 2 );
           console.log( 6 % 6 );
		</script>
	</head>
	<body></body>
</html>
