<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8" />
		<title>Fundamentos de Programação: Tipos de Dados</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			/* tipos de dados básicos também chamados de primitivos são a parte
               mais importante para determinar o que deve acontecer em todas as situações

               quatro fundamentais:
               1) números inteiros, ex: 5, 235
               2) strings (texto)
               3) números complexos (floats), ex: 1.999999
               4) booleanos: true / false
            */

			console.log(5);
			console.log('Hello World e coisas');
			console.log(213 + 213);
			console.log('213' + '213');
			console.log(0.1 + 0.2); // oops, não deu 0.3, melhor não usar para valores monetários

			console.log(true);
			console.log(false);
		</script>
	</head>
	<body>
		<p>Esta parte aqui em baixo não é importante agora.</p>
	</body>
</html>
