<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="utf-8">
        <title>Fundamentos de Programação: Condições</title>
        <script>
            /* utilizamos condições para colocar questões ao computador
               se algo for verdade, então faz isto
            */
           var temperatura = 15;

           /*
            sintaxe:
           
           if(condição aqui dentro) {
               aquilo que vai acontecer caso a condição seja verdade
           }

           exemplo:
            se estiver acima de trinta, dizer que está quente
            se estiver abaixo de 15, dizer que está frio
           */
        
            if(temperatura > 30) {
                console.log("Está quente");
            }

            if(temperatura < 15) {
                console.log("Está frio!!!");
            }

			if(temperatura == 15) {
				console.log("Estão exactamente 15 graus");
			}
        </script>
    </head>
    <body>

    </body>
</html>
