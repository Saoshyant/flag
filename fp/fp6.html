<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<title>Exercício com condições</title>
		<script>
			/*
				vamos ter uma aplicação onde só podem entrar adultos e vai ser necessário validar
				e mostrar ao utilizador mensagens de aceitação ou não dependendo da idade
			*/
			var age = prompt("Qual a tua idade?");

			if(age >= 18) {
				console.log('Podes entrar, tens ' +age+ ' anos que é idade suficiente');
			}
			else {
				console.log("Não tens idade suficiente, pois tens apenas " +age+ " anos");
			}
		</script>
	</head>
	<body>
	</body>
</html>
