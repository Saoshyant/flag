<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <title>Fundamentos de Programação: Variáveis</title>
        <script>
            var divisor = 3;
            var resultado = (1 + 2) * 4 / 2;

            console.log("resultado:", resultado);
            console.log("divisão:", resultado / divisor);
            
            divisor = 4;

            console.log("nova divisão:", resultado / divisor);

            var nome = "Cecilia";
            console.log(nome);
            nome = "Claudia";
            console.log(nome);
        </script>
    </head>
    <body>
    </body>
</html>
